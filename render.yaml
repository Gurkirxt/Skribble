services:
  - type: web
    name: skribble-backend
    env: bun
    rootDir: backend
    buildCommand: bun install
    startCommand: bun run index.ts
    envVars:
      - key: PORT
        value: 8080

  - type: web
    name: skribble-frontend
    env: static
    rootDir: frontend
    buildCommand: bun install && bun run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_BACKEND_URL
        fromService:
          type: web
          name: skribble-backend
          envVarKey: RENDER_EXTERNAL_URL
